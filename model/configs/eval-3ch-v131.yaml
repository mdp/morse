# Eval-only config: 3-channel DSP + v1.3.1 morse-audio + -16 floor.
# Used to fairly re-score the 2026-04-16 4-channel best.pt against the same
# audio distribution the new (in-progress) 4-channel run will be evaluated on.
#
# Usage:
#   git stash push -- model/data/dsp.py model/configs/4090.yaml   # 3-ch DSP
#   python main.py generate --config configs/eval-3ch-v131.yaml
#   python main.py evaluate --config configs/eval-3ch-v131.yaml \
#       --checkpoint /tmp/cw-runs/latest/4090_best.pt \
#       --out-json   /tmp/cw-runs/latest/eval_v131.json
#   git stash pop
name: eval-3ch-v131

paths:
  train_dir: data/train_eval3ch  # not used (n_train=0)
  val_dir:   data/val_eval3ch
  run_dir:   runs

dsp:
  channels: 3                    # informational; actual count comes from data/dsp.py
  sample_rate: 8000
  envelope_rate: 500

model:
  in_channels: 3                 # auto-detected from checkpoint anyway
  gru_hidden: 128
  gru_layers: 2
  tcn_channels: 128
  tcn_blocks: 5
  dropout: 0.0

training:
  batch_size: 32
  num_workers: 2

data:
  n_train: 0                     # skip train gen
  n_val: 1000                    # match the 4-16 final_eval n
  seed: 42
  max_chars: 20
  max_clip_s: 15.0
  gen_workers: 4
  dsp_workers: 8
  # Match the new run's distribution exactly so CER numbers are comparable.
  snr_tiers:
    very_low: {range: [-16, -10], weight: 0.20}
    low:      {range: [-10,  -4], weight: 0.20}
    mid:      {range: [ -4,   2], weight: 0.40}
    high:     {range: [  2,   6], weight: 0.20}
  buckets:
    slow:
      wpm: [12, 25]
      weight: 0.35
      impairment: {clean: 0.7, qsb: 0.3}
      fist:
        jitter_pct:          [0.01, 0.15]
        dah_bias:            [-0.05, 0.05]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.10]
        char_gap_stretch:    [0.8, 1.2]
    mid:
      wpm: [25, 40]
      weight: 0.40
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.02, 0.20]
        dah_bias:            [-0.07, 0.07]
        speed_drift:         [0.0,  0.03]
        char_gap_stretch_frac: [0.0, 0.15]
        char_gap_stretch:    [0.7, 1.3]
    fast:
      wpm: [40, 60]
      weight: 0.25
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.01, 0.10]
        dah_bias:            [-0.03, 0.03]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.05]
        char_gap_stretch:    [0.9, 1.1]
