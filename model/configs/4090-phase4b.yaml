# Phase 4b: paired clean/noisy self-distillation.
#
# Phase 3 model is deletion-dominated at very low SNR — emits only ~66% of
# target length at -16 dB. Phase 4a (gate relaxation) flatlined: training
# knobs weren't actually constraining the model in fine-tune mode. The
# hypothesis from the GPT5.5 doc and the Phase 4 plan: the model lacks
# dense supervision at the regime where the noisy envelope barely encodes
# the Morse content. A clean teacher of the SAME Morse content can
# transfer character-firing alignment through noise.
#
# Method: each training sample is generated TWICE with same seed — once at
# the sampled SNR (student input), once at +30 dB (teacher input). morse-
# audio's prng is deterministic per seed, so the underlying signal/timing
# is bit-identical between pair members; only the noise scale differs.
# Silence augmentation is applied with a sample-index-derived rng seed so
# both members get IDENTICAL augmentation, keeping them frame-aligned for
# distillation.
#
# Loss: KL(student_logits || teacher_logits) at temperature 2.0, weighted
# 0.5. Added on top of Phase 3's CTC + entropy + tone BCE.
#
# Cost: 2x WAV generation, 2x DSP — 60-80 min generate (vs ~30 min in
# Phase 3). Training adds one extra teacher forward per batch — ~1.5x
# wallclock per epoch. 20 epochs total.
#
# Pass = ≤-10 dB tier CER materially below Phase 3's 0.374 AND overall
# CER ≤ 0.0959 (prod baseline + tolerance) AND deletion fractions in
# -14..-15 / -16..-15 bins drop ≥ 30%.
#
# Launch:
#   python launch-runpod.py --config configs/4090-phase4b.yaml
#   (auto-detects checkpoints/best.pt = Phase 3 best at 0.0880)
name: 4090-phase4b

paths:
  train_dir: data/train
  val_dir:   data/val
  run_dir:   runs

dsp:
  channels: 4
  sample_rate: 8000
  envelope_rate: 500

model:
  in_channels: 4
  gru_hidden: 128
  gru_layers: 2
  tcn_channels: 128
  tcn_blocks: 5
  dropout: 0.2

training:
  epochs: 20
  ce_pretrain_epochs: 0
  ce_blend_epochs: 0
  batch_size: 40         # bs=48 in Phase 3; -8 to leave memory for the
                         # extra teacher forward (clean envelopes batch).
  lr: 0.00015
  warmup_epochs: 1
  num_workers: 8
  entropy_weight: 0.03
  ce_blank_weight: 0.2
  ce_char_weight: 3.0
  tone_weight: 0.3
  tone_pos_weight: 2.5
  # Phase 4b knobs:
  distill_weight: 0.5
  distill_temperature: 2.0

data:
  n_train: 50000
  n_val: 1000
  seed: 42
  max_chars: 20
  max_clip_s: 15.0
  gen_workers: 4
  dsp_workers: 12
  # Phase 4b: enable paired generation. Each train sample produces a
  # noisy WAV (at sampled SNR) and a clean WAV (at this snrDb). NPZs
  # store both envelopes side-by-side. Val NPZs are unaffected — we
  # don't need a clean teacher at eval time.
  paired_clean_snr_db: 30.0
  snr_tiers:
    very_low: {range: [-16, -10], weight: 0.20}
    low:      {range: [-10,  -4], weight: 0.20}
    mid:      {range: [ -4,   2], weight: 0.40}
    high:     {range: [  2,   6], weight: 0.20}
  buckets:
    slow:
      wpm: [12, 25]
      weight: 0.35
      impairment: {clean: 0.7, qsb: 0.3}
      fist:
        jitter_pct:          [0.01, 0.15]
        dah_bias:            [-0.05, 0.05]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.10]
        char_gap_stretch:    [0.8, 1.2]
    mid:
      wpm: [25, 40]
      weight: 0.40
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.02, 0.20]
        dah_bias:            [-0.07, 0.07]
        speed_drift:         [0.0,  0.03]
        char_gap_stretch_frac: [0.0, 0.15]
        char_gap_stretch:    [0.7, 1.3]
    fast:
      wpm: [40, 60]
      weight: 0.25
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.01, 0.10]
        dah_bias:            [-0.03, 0.03]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.05]
        char_gap_stretch:    [0.9, 1.1]
