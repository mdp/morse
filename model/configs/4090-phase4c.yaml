# Phase 4c: combine P4a's wins (gate relax + low-SNR overweight) with P4b's
# paired clean/noisy KL distillation, train+eval at -14 dB floor (skip the
# information-limited -16..-14 dB regime where P3/P4a/P4b were essentially
# noise-floor-bound). 100k samples × 30 epochs warm-started from P4a.
#
# Hypothesis: P4a's low-SNR feature extraction + distillation's alignment
# transfer + 2x more data should compound. P4b's distillation showed
# moderate-SNR gains (-8..-3 dB) but lost at -16..-14; cutting the floor at
# -14 frees the model to specialize where copy actually matters.
#
# Trade-off: this run loses Phase 4a's deep-noise-floor strength (training
# data won't include -16..-14 anymore). Keep P4a as the "deep-noise-floor"
# reference; promote P4c only if it beats P4a on the -14-floor eval.
#
# Cost estimate: gen ~10 min (200k paired WAVs / 12 DSP workers), train
# ~4 hours (30 epochs × ~8 min/epoch at 100k/bs=40), final eval ~5 min.
# Total ~4.5 hours pod time.
#
# Pass: -14-floor val Overall CER materially below P4a's 0.0856 AND
# ≤-10 dB tier below P4a's 0.2404 AND no regression at -10..-4 dB.
#
# Launch:
#   python launch-runpod.py --config configs/4090-phase4c.yaml
#   (auto-detects checkpoints/best.pt = Phase 4a)
name: 4090-phase4c

paths:
  train_dir: data/train
  val_dir:   data/val
  run_dir:   runs

dsp:
  channels: 4
  sample_rate: 8000
  envelope_rate: 500

model:
  in_channels: 4
  gru_hidden: 128
  gru_layers: 2
  tcn_channels: 128
  tcn_blocks: 5
  dropout: 0.2

training:
  epochs: 30
  ce_pretrain_epochs: 0
  ce_blend_epochs: 0
  # bs=40 same as P4b — leaves headroom for the extra teacher forward.
  batch_size: 40
  # Same fine-tune LR as P4a/P4b. With 2x more data (more batches per
  # epoch) and 2x more epochs, the cosine scheduler will run through
  # roughly 6x more steps than P4a — that's enough range to settle even
  # with a strong distillation signal pulling the model around.
  lr: 0.00015
  warmup_epochs: 1
  num_workers: 8
  # P4a's relaxed gates (entropy_weight is the only one that actually
  # bites in pure-CTC fine-tune; ce_blank_weight is a no-op without CE
  # loss but kept for consistency in case CE loss is re-introduced).
  entropy_weight: 0.01
  ce_blank_weight: 0.4
  ce_char_weight: 3.0
  # P3 Phase 3 multi-head — kept on (free training-time regularizer; tone
  # head is also the artifact a future fixed HSMM would consume).
  tone_weight: 0.3
  tone_pos_weight: 2.5
  # P4b distillation knobs — same as the run that worked mechanically.
  distill_weight: 0.5
  distill_temperature: 2.0

data:
  # Was 100k; knocked back to 50k after the 100k paired run failed at TS
  # gen with disk-full (200k WAVs × ~160KB ≈ 32GB peak before DSP cleans
  # up, vs the pod's 12GB overlay headroom). To go larger later we'd need
  # either a bigger ephemeral disk or a streaming generate→DSP→delete
  # refactor in run_ts_generator.
  n_train: 50000
  n_val: 1000
  seed: 42
  max_chars: 20
  max_clip_s: 15.0
  gen_workers: 4
  dsp_workers: 12
  # Phase 4b paired generation — clean teacher input at +30 dB, frame-
  # aligned with noisy student input.
  paired_clean_snr_db: 30.0
  # Phase 4c: SNR floor moved from -16 to -14 dB. Below -14 the -14-floor
  # re-eval showed P3/P4a/P4b were all essentially noise-floor-bound.
  # Keeping very_low overweighted at 0.30 — same fraction as P4a but now
  # concentrated in the recoverable -14..-10 range.
  snr_tiers:
    very_low: {range: [-14, -10], weight: 0.30}
    low:      {range: [-10,  -4], weight: 0.20}
    mid:      {range: [ -4,   2], weight: 0.30}
    high:     {range: [  2,   6], weight: 0.20}
  buckets:
    slow:
      wpm: [12, 25]
      weight: 0.35
      impairment: {clean: 0.7, qsb: 0.3}
      fist:
        jitter_pct:          [0.01, 0.15]
        dah_bias:            [-0.05, 0.05]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.10]
        char_gap_stretch:    [0.8, 1.2]
    mid:
      wpm: [25, 40]
      weight: 0.40
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.02, 0.20]
        dah_bias:            [-0.07, 0.07]
        speed_drift:         [0.0,  0.03]
        char_gap_stretch_frac: [0.0, 0.15]
        char_gap_stretch:    [0.7, 1.3]
    fast:
      wpm: [40, 60]
      weight: 0.25
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.01, 0.10]
        dah_bias:            [-0.03, 0.03]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.05]
        char_gap_stretch:    [0.9, 1.1]
