[project]
name = "cw-model"
version = "0.1.0"
description = "CW (Morse code) streaming decoder: 1-ch DSP → CNN+TCN+BiGRU → CTC"
requires-python = ">=3.10"
dependencies = [
    # Upper-bound torch: the ONNX export uses the legacy TorchScript exporter,
    # which torch 3.x is expected to remove. Pin below 3 so an upgrade can't
    # silently break `export:onnx`. Bump deliberately after re-validating export.
    "torch>=2.2.0,<3",
    "numpy>=1.26.0",
    "scipy>=1.12.0",
    "soundfile>=0.12.0",
    "pyyaml>=6.0",
    "python-levenshtein>=0.25.0",
    "tqdm>=4.66.0",
    "onnxruntime>=1.17.0",
    "onnx>=1.20.1",
    "python-dotenv>=1.0.0",
    "runpod>=1.8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["data", "model", "training", "eval", "scripts"]
