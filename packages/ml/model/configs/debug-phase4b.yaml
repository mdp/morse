# Pipeline-test config for Phase 4b paired distillation. NOT a real
# training config. Validates: paired generation, NPZ shape with
# envelopes_clean, distillation loss, training step under CW_QUIET=1.
name: debug-phase4b

paths:
  train_dir: data/debug-phase4b/train
  val_dir:   data/debug-phase4b/val
  run_dir:   runs

dsp:
  channels: 4
  sample_rate: 8000
  envelope_rate: 500

model:
  in_channels: 4
  gru_hidden: 32
  gru_layers: 1
  tcn_channels: 32
  tcn_blocks: 2
  dropout: 0.0

training:
  epochs: 1
  ce_pretrain_epochs: 0
  ce_blend_epochs: 0
  batch_size: 8
  lr: 0.001
  warmup_epochs: 0
  num_workers: 0
  entropy_weight: 0.03
  ce_blank_weight: 0.2
  ce_char_weight: 3.0
  tone_weight: 0.3
  tone_pos_weight: 2.5
  distill_weight: 0.5
  distill_temperature: 2.0

data:
  n_train: 50
  n_val: 10
  seed: 42
  max_chars: 12
  max_clip_s: 8.0
  gen_workers: 1
  dsp_workers: 1
  paired_clean_snr_db: 30.0
  snr_tiers:
    mid:  {range: [-3, 6], weight: 1.0}
  buckets:
    mid:
      wpm: [18, 30]
      weight: 1.0
      impairment: clean
      fist:
        jitter_pct:          [0.02, 0.08]
        dah_bias:            [-0.03, 0.03]
        speed_drift:         [0.0,  0.01]
        char_gap_stretch_frac: [0.0, 0.05]
        char_gap_stretch:    [0.9, 1.1]
