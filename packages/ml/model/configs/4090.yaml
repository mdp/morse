# 4090 training config — causal TCN + chunked BiGRU streaming decoder (275ms latency)
# 4-channel DSP (Hilbert + TKEO + 48 ms MF + 200 ms MF) — synced from
# packages/ml/cw-dsp-research/dsp.py (composite 0.8249 on v1.3.1 -16..-8 dB eval).
# SNR floor matches eval: -16 dB. Below that the DSP is sub-2% accurate
# (see cw-dsp-research/CURRENT.md detection-floor table) — training there
# is mostly memorization of language priors.
# Launch: python launch-runpod.py --config configs/4090.yaml
name: 4090

paths:
  train_dir: data/train
  val_dir:   data/val
  run_dir:   runs

dsp:
  channels: 4
  sample_rate: 8000
  envelope_rate: 500

model:
  in_channels: 4
  gru_hidden: 128
  gru_layers: 2
  tcn_channels: 128
  tcn_blocks: 5
  dropout: 0.2

training:
  epochs: 60
  ce_pretrain_epochs: 5
  ce_blend_epochs: 3
  batch_size: 64
  lr: 0.0003
  warmup_epochs: 3
  num_workers: 8
  entropy_weight: 0.03
  ce_blank_weight: 0.2
  ce_char_weight: 3.0

data:
  n_train: 50000
  n_val: 1000
  seed: 42
  max_chars: 20
  max_clip_s: 15.0
  gen_workers: 4
  dsp_workers: 12
  snr_tiers:
    very_low: {range: [-16, -10], weight: 0.20}
    low:      {range: [-10,  -4], weight: 0.20}
    mid:      {range: [ -4,   2], weight: 0.40}
    high:     {range: [  2,   6], weight: 0.20}
  buckets:
    slow:
      wpm: [12, 25]
      weight: 0.35
      impairment: {clean: 0.7, qsb: 0.3}
      fist:
        jitter_pct:          [0.01, 0.15]
        dah_bias:            [-0.05, 0.05]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.10]
        char_gap_stretch:    [0.8, 1.2]
    mid:
      wpm: [25, 40]
      weight: 0.40
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.02, 0.20]
        dah_bias:            [-0.07, 0.07]
        speed_drift:         [0.0,  0.03]
        char_gap_stretch_frac: [0.0, 0.15]
        char_gap_stretch:    [0.7, 1.3]
    fast:
      wpm: [40, 60]
      weight: 0.25
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.01, 0.10]
        dah_bias:            [-0.03, 0.03]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.05]
        char_gap_stretch:    [0.9, 1.1]
