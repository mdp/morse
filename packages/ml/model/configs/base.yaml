# Base training config — full run on RunPod (RTX 4090 or A100)
name: base

paths:
  train_dir: data/train
  val_dir:   data/val
  run_dir:   runs

dsp:
  channels: 1          # Single IQ magnitude channel (packages/ml/cw-dsp-research validated)
  sample_rate: 8000
  envelope_rate: 500

model:
  in_channels: 1
  gru_hidden: 128
  gru_layers: 2
  dropout: 0.2

training:
  epochs: 60
  ce_pretrain_epochs: 5
  ce_blend_epochs: 3
  batch_size: 96
  lr: 0.0002
  warmup_epochs: 3
  num_workers: 4
  # Anti-hallucination: push blank/char distinction harder than cw-decode did
  entropy_weight: 0.03   # Was 0.01 in cw-decode — primary low-SNR anti-hallucination knob
  ce_blank_weight: 0.2   # Was 0.5 in cw-decode — force model to learn silence → blank
  ce_char_weight: 3.0    # Was 2.0 in cw-decode — force model to learn signal → char

data:
  n_train: 100000
  n_val: 2000
  seed: 42
  max_chars: 20
  max_clip_s: 15.0
  gen_workers: 4
  dsp_workers: 8
  # SNR: reduce very-low tier vs cw-decode (was 40%) — over-training on noise teaches hallucination
  snr_tiers:
    very_low: {range: [-18, -10], weight: 0.25}
    low:      {range: [-10,  -4], weight: 0.20}
    mid:      {range: [ -4,   2], weight: 0.35}
    high:     {range: [  2,   6], weight: 0.20}
  buckets:
    slow:
      wpm: [12, 25]
      weight: 0.35
      impairment: {clean: 0.7, qsb: 0.3}
      fist:
        jitter_pct:          [0.01, 0.15]
        dah_bias:            [-0.05, 0.05]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.10]
        char_gap_stretch:    [0.8, 1.2]
    mid:
      wpm: [25, 40]
      weight: 0.40
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.02, 0.20]
        dah_bias:            [-0.07, 0.07]
        speed_drift:         [0.0,  0.03]
        char_gap_stretch_frac: [0.0, 0.15]
        char_gap_stretch:    [0.7, 1.3]
    fast:
      wpm: [40, 60]
      weight: 0.25
      impairment: {clean: 0.6, qsb: 0.4}
      fist:
        jitter_pct:          [0.01, 0.10]
        dah_bias:            [-0.03, 0.03]
        speed_drift:         [0.0,  0.02]
        char_gap_stretch_frac: [0.0, 0.05]
        char_gap_stretch:    [0.9, 1.1]
